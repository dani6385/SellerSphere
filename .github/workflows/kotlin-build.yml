name: Kotlin Build Workflow

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # HAPUS BAGIAN defaults: working-directory DI SINI
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        # Ini akan mencari gradlew di folder utama (root)
        run: chmod +x gradlew

      - name: Regenerate Gradle Wrapper
        # Meregenerasi gradle-wrapper.jar asli dari runner untuk menghindari isu file korup di Git
        run: gradle wrapper --gradle-version 9.3.1

      - name: Set up Keystore
        # Mendecode debug.keystore.base64 jika ada, atau membuat keystore debug baru jika tidak ada
        run: |
          if [ -f "debug.keystore.base64" ]; then
            echo "Decoding existing debug.keystore.base64..."
            base64 -d debug.keystore.base64 > debug.keystore
          else
            echo "debug.keystore.base64 not found. Generating a new debug.keystore..."
            keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
          fi

      - name: Build with Gradle
        # Ini akan menjalankan perintah dari folder utama
        run: ./gradlew assembleRelease --no-daemon --parallel
        env:
          ORG_GRADLE_PROJECT_jvmargs: -Xmx2048m -XX:MaxMetaspaceSize=512m

      - name: Upload to Firebase App Distribution
        uses: w9jds/firebase-action@master
        with:
          # Pastikan path ini sesuai dengan struktur folder Anda
          args: appdistribution:distribute app/build/outputs/apk/release/app-release.apk --app ${{ secrets.FIREBASE_APP_ID }} --groups "tester-group"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}