name: Kotlin Build Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Menggunakan Java 17/21 dengan caching Gradle untuk menghemat RAM
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      # Memberikan izin eksekusi pada Gradle wrapper
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Melakukan Build dengan flag optimasi memori
      - name: Build with Gradle
        run: ./gradlew assembleDebug --no-daemon --parallel
        env:
          # Mengatur limit memori agar tidak crash di runner gratis
          ORG_GRADLE_PROJECT_jvmargs: -Xmx2048m -XX:MaxMetaspaceSize=512m

      # Tambahan: Upload ke Firebase App Distribution
      - name: Upload to Firebase App Distribution
        uses: w9jds/firebase-action@master
        with:
          args: appdistribution:distribute app/build/outputs/apk/debug/app-debug.apk --app ${{ secrets.FIREBASE_APP_ID }} --groups "tester-group"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}